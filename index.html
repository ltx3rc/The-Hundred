<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Hundred</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

.container{

width:100%;
padding:30px;
text-align:center;

}

.logo{

width:190px;
opacity:0;
transform:scale(.7);

animation:logoAnimation 1.3s forwards;

}

@keyframes logoAnimation{

0%{

opacity:0;
transform:scale(.7);

}

100%{

opacity:1;
transform:scale(1);

}

}

.tagline{

margin-top:15px;
color:white;
font-size:16px;
font-weight:500;
letter-spacing:.5px;

opacity:0;

animation:fadeText 1s forwards;
animation-delay:.8s;

}

@keyframes fadeText{

to{

opacity:1;

}

}

.loaderCard{

margin:45px auto 0;

max-width:360px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(20px);

border-radius:24px;

padding:25px;

box-shadow:0 10px 40px rgba(255,255,255,.05);

}

.loaderTitle{

color:white;

font-size:20px;

font-weight:600;

margin-bottom:20px;

}

.progress{

height:8px;

background:rgba(255,255,255,.1);

border-radius:30px;

overflow:hidden;

position:relative;

}

.bar{

width:0%;

height:100%;

background:linear-gradient(90deg,#E30613,#ff5757);

border-radius:30px;

position:relative;

overflow:hidden;

}

.bar::after{

content:'';

position:absolute;

top:0;

left:-40%;

width:40%;

height:100%;

background:rgba(255,255,255,.5);

filter:blur(5px);

animation:shine 1.2s linear infinite;

}

@keyframes shine{

100%{

left:140%;

}

}

.percent{

margin-top:18px;

font-size:24px;

font-weight:700;

color:#ffffff;

}

.typing{

margin-top:22px;

font-size:15px;

color:#58BFFF;

font-weight:500;

height:24px;

}

.cursor{

animation:blink .8s infinite;

}

@keyframes blink{

50%{

opacity:0;

}

}
  .statusBox{

margin-top:22px;

text-align:left;

}

.status{

display:flex;

align-items:center;

gap:10px;

margin:12px 0;

color:#d7d7d7;

font-size:15px;

opacity:.35;

transition:.35s;

}

.status.active{

opacity:1;

color:#ffffff;

}

.status.done{

opacity:1;

color:#3DDC84;

}

.icon{

width:20px;

text-align:center;

font-weight:bold;

}

.welcome{

display:none;

margin-top:28px;

animation:welcome .8s ease;

}

.welcome h2{

color:#ffffff;

font-size:22px;

font-weight:500;

}

.welcome h1{

margin-top:8px;

color:#E30613;

font-size:34px;

letter-spacing:2px;

font-weight:700;

}

@keyframes welcome{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.version{

position:fixed;

bottom:18px;

left:0;

right:0;

text-align:center;

font-size:13px;

color:#888;

letter-spacing:.5px;

}

.float{

animation:floatLogo 3s ease-in-out infinite;

}

@keyframes floatLogo{

0%{
  <script>

const typing=document.getElementById("typing");

const bar=document.getElementById("bar");

const percent=document.getElementById("percent");

const welcome=document.getElementById("welcome");

const st1=document.getElementById("st1");
const st2=document.getElementById("st2");
const st3=document.getElementById("st3");
const st4=document.getElementById("st4");

const messages=[

"Initializing Engine...",
"Loading Restaurant...",
"Connecting Database...",
"Preparing Workspace...",
"Ready..."

];

let msgIndex=0;
let charIndex=0;
let deleting=false;

function typingEffect(){

const current=messages[msgIndex];

if(!deleting){

typing.textContent=current.substring(0,charIndex);

charIndex++;

if(charIndex>current.length){

deleting=true;

setTimeout(typingEffect,700);

return;

}

}else{

typing.textContent=current.substring(0,charIndex);

charIndex--;

if(charIndex<0){

deleting=false;

msgIndex++;

charIndex=0;

if(msgIndex>=messages.length){

msgIndex=0;

}

}

}

setTimeout(typingEffect,55);

}

typingEffect();

let p=0;

const loader=setInterval(()=>{

p++;

percent.innerHTML=p+"%";

bar.style.width=p+"%";

if(p==15){

st1.classList.add("active");

}

if(p==25){

st1.classList.remove("active");

st1.classList.add("done");

st1.querySelector(".icon").innerHTML="✔";

}

if(p==35){

st2.classList.add("active");

}

if(p==50){

st2.classList.remove("active");

st2.classList.add("done");

st2.querySelector(".icon").innerHTML="✔";

}

if(p==60){

st3.classList.add("active");

}

if(p==75){

st3.classList.remove("active");

st3.classList.add("done");

st3.querySelector(".icon").innerHTML="✔";

}

if(p==85){

st4.classList.add("active");

}

if(p==100){

clearInterval(loader);

}

},45);if(p>=100){

percent.innerHTML="100%";

setTimeout(()=>{

document.querySelector(".progress").style.display="none";
document.querySelector(".percent").style.display="none";
document.querySelector(".typing").style.display="none";
document.querySelector(".statusBox").style.display="none";

welcome.style.display="block";

if(navigator.vibrate){

navigator.vibrate(80);

}

setTimeout(()=>{

document.body.style.transition="opacity .8s ease";
document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="login.html";

},800);

},1800);

},500);

}

</script>

</body>

</html>
}
  
}
