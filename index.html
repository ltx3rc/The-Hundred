<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Hundred</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{

background:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

.container{

text-align:center;
width:100%;
padding:25px;

}

.logo{

width:185px;
opacity:0;
transform:scale(.75);
animation:logo 1s ease forwards;

}

@keyframes logo{

0%{

opacity:0;
transform:scale(.75);

}

100%{

opacity:1;
transform:scale(1);

}

}

.tagline{

margin-top:10px;
font-size:17px;
font-weight:600;
color:#555;
opacity:0;
animation:fade 1s forwards;
animation-delay:.8s;

}

@keyframes fade{

to{

opacity:1;

}

}

.loader-card{

width:320px;
max-width:95%;
margin:40px auto;
padding:22px;
background:rgba(255,255,255,.85);
border-radius:22px;
box-shadow:0 12px 40px rgba(0,0,0,.08);
border:1px solid rgba(255,255,255,.4);
backdrop-filter:blur(18px);

}

.loader-title{

font-size:18px;
font-weight:700;
color:#111;
margin-bottom:18px;

}

.progress{

width:100%;
height:10px;
background:#ececec;
border-radius:30px;
overflow:hidden;

}

.bar{

width:0%;
height:100%;
background:linear-gradient(90deg,#E30613,#ff5b5b);
border-radius:30px;
transition:.35s;

}

.percent{

margin-top:14px;
font-size:18px;
font-weight:700;
color:#E30613;

}

.status{

margin-top:20px;
text-align:left;

}

.status p{

font-size:15px;
padding:7px 0;
color:#444;

}

.check{

color:#18a558;
font-weight:bold;

}

.wait{

color:#999;

}

.welcome{

margin-top:25px;
font-size:24px;
font-weight:700;
color:#111;
display:none;
animation:fadeUp .8s;

}

.welcome span{

display:block;
margin-top:6px;
color:#E30613;
font-size:30px;
letter-spacing:2px;

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.version{

position:absolute;
bottom:18px;
left:0;
right:0;
text-align:center;
font-size:13px;
color:#999;

}

</style>

</head>
<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="tagline">
Taste Beyond Limits
</div>

<div class="loader-card">

<div class="loader-title">
⚡ Preparing Workspace
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="percent" id="percent">
0%
</div>

<div class="status">

<p id="s1"><span class="wait">⏳</span> Initializing UI...</p>

<p id="s2"><span class="wait">⏳</span> Loading Assets...</p>

<p id="s3"><span class="wait">⏳</span> Preparing Dashboard...</p>

<p id="s4"><span class="wait">⏳</span> Finalizing...</p>

</div>

<div class="welcome" id="welcome">

Welcome To

<span>THE HUNDRED</span>

</div>

</div>

</div>

<div class="version">
The Hundred Manager v1.0
</div>

<script>

let percent=0;

const bar=document.getElementById("bar");
const txt=document.getElementById("percent");

const s1=document.getElementById("s1");
const s2=document.getElementById("s2");
const s3=document.getElementById("s3");
const s4=document.getElementById("s4");

const welcome=document.getElementById("welcome");

const timer=setInterval(()=>{

percent++;

bar.style.width=percent+"%";

txt.innerHTML=percent+"%";

if(percent==20){

s1.innerHTML='<span class="check">✔</span> Initializing UI';

}

if(percent==45){

s2.innerHTML='<span class="check">✔</span> Loading Assets';

}

if(percent==70){

s3.innerHTML='<span class="check">✔</span> Preparing Dashboard';

}

if(percent==95){

s4.innerHTML='<span class="check">✔</span> Ready';

}

if(percent>=100){

clearInterval(timer);

document.querySelector(".status").style.display="none";

document.querySelector(".progress").style.display="none";

document.querySelector(".percent").style.display="none";

welcome.style.display="block";

setTimeout(()=>{

document.body.style.transition=".8s";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="login.html";

},800);

},1800);

}

},40);

</script>

</body>

</html>
