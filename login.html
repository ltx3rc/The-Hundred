<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Hundred Manager</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{

--glass:rgba(255,255,255,.08);
--border:rgba(255,255,255,.14);

}

body{

background:#070707;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:#fff;

}

body::before{

content:"";

position:fixed;

width:320px;

height:320px;

border-radius:50%;

background:#E30613;

filter:blur(120px);

top:-80px;

right:-80px;

opacity:.22;

animation:moveRed 10s ease-in-out infinite;

}

body::after{

content:"";

position:fixed;

width:280px;

height:280px;

border-radius:50%;

background:#0A84FF;

filter:blur(120px);

bottom:-80px;

left:-80px;

opacity:.18;

animation:moveBlue 12s ease-in-out infinite;

}

@keyframes moveRed{

50%{

transform:translate(-45px,45px);

}

}

@keyframes moveBlue{

50%{

transform:translate(45px,-35px);

}

}

.container{

width:100%;

max-width:390px;

padding:22px;

position:relative;

z-index:10;

}

.logoBox{

width:126px;

height:126px;

margin:auto;

border-radius:32px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);

-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.15);

display:flex;

align-items:center;

justify-content:center;

box-shadow:

0 25px 60px rgba(0,0,0,.45),

inset 0 1px 1px rgba(255,255,255,.18);

animation:float 4s ease-in-out infinite;

}

.logoBox img{

width:92px;

height:92px;

border-radius:24px;

object-fit:cover;

}

@keyframes float{

50%{

transform:translateY(-8px);

}

}

.title{

margin-top:22px;

text-align:center;

font-size:30px;

font-weight:700;

}

.sub{

margin-top:8px;

text-align:center;

color:#bdbdbd;

margin-bottom:28px;

font-size:15px;

}
.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(35px);

-webkit-backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.12);

border-radius:34px;

padding:26px;

box-shadow:

0 25px 60px rgba(0,0,0,.45),

inset 0 1px 1px rgba(255,255,255,.18);

}

.label{

display:block;

font-size:14px;

font-weight:600;

margin-bottom:8px;

color:#f1f1f1;

}

.inputBox{

position:relative;

margin-bottom:18px;

}

.input{

width:100%;

height:58px;

padding:0 18px;

padding-right:52px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:15px;

transition:.3s;

backdrop-filter:blur(20px);

}

.input::placeholder{

color:#b8b8b8;

}

.input:focus{

border-color:rgba(255,255,255,.28);

background:rgba(255,255,255,.12);

box-shadow:0 0 20px rgba(255,255,255,.05);

}

.eye{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

font-size:20px;

cursor:pointer;

user-select:none;

opacity:.75;

transition:.25s;

}

.eye:hover{

opacity:1;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:22px;

font-size:14px;

}

.row label{

display:flex;

align-items:center;

gap:8px;

cursor:pointer;

color:#d7d7d7;

}

.row a{

color:#58BFFF;

text-decoration:none;

font-weight:600;

}

.btn{

width:100%;

height:58px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:17px;

font-weight:700;

color:#fff;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(25px);

transition:.3s;

}

.btn:hover{

transform:translateY(-2px);

background:rgba(255,255,255,.18);

}

.error{

margin-top:15px;

text-align:center;

color:#ff6b6b;

font-size:14px;

min-height:20px;

}

.footer{

margin-top:20px;

text-align:center;

color:#8d8d8d;

font-size:13px;

}
</style>

</head>

<body>

<div class="container">

<div class="logoBox">

<img src="logo.png" alt="The Hundred">

</div>

<div class="title">

Welcome Back

</div>

<div class="sub">

The Hundred Manager

</div>

<div class="card">

<label class="label">

Manager Email

</label>

<div class="inputBox">

<input
id="email"
class="input"
type="email"
placeholder="ltx3rc@gmail.com"
autocomplete="email">

</div>

<label class="label">

Password

</label>

<div class="inputBox">

<input
id="password"
class="input"
type="password"
placeholder="••••••••"
autocomplete="current-password">

<span
class="eye"
id="togglePassword">

👁️

</span>

</div>

<div class="row">

<label>

<input
type="checkbox"
id="remember">

Remember Me

</label>

<a href="#">

Forgot?

</a>

</div>

<button
id="loginBtn"
class="btn">

Login

</button>

<button
id="faceBtn"
class="btn"
style="margin-top:14px;">

 Face ID

</button>

<div
id="error"
class="error">

</div>

<div class="footer">

The Hundred Manager • Powered by Firebase

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword,

browserLocalPersistence,

setPersistence,

onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyCD-XpA3Quu2pHMrg4qZKGC3_fvbigPixg",

authDomain:"the-hundred-ac2d3.firebaseapp.com",

projectId:"the-hundred-ac2d3",

storageBucket:"the-hundred-ac2d3.firebasestorage.app",

messagingSenderId:"1094366558018",

appId:"1:1094366558018:web:af8c45af4ab1afad0ffadb"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const email=document.getElementById("email");
const password=document.getElementById("password");
const loginBtn=document.getElementById("loginBtn");
const error=document.getElementById("error");
const togglePassword=document.getElementById("togglePassword");
const faceBtn=document.getElementById("faceBtn");

setPersistence(auth,browserLocalPersistence);

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href="dashboard.html";

}

});

togglePassword.onclick=()=>{

if(password.type==="password"){

password.type="text";

togglePassword.innerHTML="🙈";

}else{

password.type="password";

togglePassword.innerHTML="👁️";

}

};

loginBtn.onclick=async()=>{

error.innerHTML="";

loginBtn.innerHTML="Signing In...";

loginBtn.disabled=true;

try{

await signInWithEmailAndPassword(

auth,

email.value.trim(),

password.value

);

loginBtn.innerHTML="Success ✅";

setTimeout(()=>{

window.location.href="dashboard.html";

},700);

}catch(e){

loginBtn.innerHTML="Login";

loginBtn.disabled=false;

switch(e.code){

case "auth/invalid-email":

error.innerHTML="Invalid Email";

break;

case "auth/user-not-found":

error.innerHTML="Manager Account Not Found";

break;

case "auth/wrong-password":

error.innerHTML="Wrong Password";

break;

case "auth/invalid-credential":

error.innerHTML="Invalid Email or Password";

break;

default:

error.innerHTML=e.message;

}

}

};

faceBtn.onclick=()=>{

if(window.PublicKeyCredential){

alert("✅ Face ID / Passkeys supported.\n\nNext version me biometric login add karenge.");

}else{

alert("Face ID supported nahi hai ya browser support nahi karta.");

}

};

</script>

</body>

</html>
