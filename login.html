<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>The Hundred Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:#080808;overflow:hidden}
body:before,body:after{content:"";position:fixed;width:280px;height:280px;border-radius:50%;filter:blur(90px);opacity:.28}
body:before{background:#ff2d55;top:-80px;right:-80px}
body:after{background:#0a84ff;bottom:-80px;left:-80px}
.card{width:min(390px,92vw);padding:28px;border-radius:34px;background:rgba(255,255,255,.08);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.15);box-shadow:0 25px 60px rgba(0,0,0,.5)}
.iconwrap{width:120px;height:120px;margin:0 auto 20px;border-radius:30px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.15);box-shadow:inset 0 1px 1px rgba(255,255,255,.15)}
.iconwrap img{width:92px;height:92px;border-radius:24px;object-fit:cover}
h1{color:#fff;text-align:center;font-size:32px}p{color:#aaa;text-align:center;margin:8px 0 22px}
input{width:100%;padding:16px;margin:10px 0;border:none;border-radius:18px;background:rgba(255,255,255,.08);color:#fff;outline:none}
input::placeholder{color:#bbb}
button{width:100%;padding:16px;border:none;border-radius:18px;background:rgba(255,255,255,.12);backdrop-filter:blur(20px);color:#fff;font-size:18px;font-weight:700;border:1px solid rgba(255,255,255,.15)}
button:hover{background:rgba(255,255,255,.18)}
small{display:block;text-align:center;color:#888;margin-top:18px}
</style></head>
<body><div class='card'>
<div class='iconwrap'><img src='logo.png'></div>
<h1>Welcome Back</h1><p>Manager Login</p>
<input placeholder='Email'>
<input type='password' placeholder='Password'>
<button onclick="location.href='dashboard.html'">Login</button>
<small>The Hundred Manager • 2026 Copyright Reserved</small>
</div></body></html>
