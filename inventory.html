<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Inventory | The Hundred</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#060606;
--glass:rgba(255,255,255,.08);
--glass2:rgba(255,255,255,.12);
--border:rgba(255,255,255,.14);

--red:#E30613;
--blue:#0A84FF;
--green:#22c55e;
--yellow:#FFD60A;

--text:#fff;

}

body{

background:var(--bg);
color:var(--text);
overflow-x:hidden;
min-height:100vh;
position:relative;

}

body::before{

content:"";
position:fixed;
width:420px;
height:420px;
background:#ff2d55;
border-radius:50%;
filter:blur(150px);
top:-160px;
right:-150px;
opacity:.18;
animation:redMove 10s infinite ease-in-out;

}

body::after{

content:"";
position:fixed;
width:360px;
height:360px;
background:#0A84FF;
border-radius:50%;
filter:blur(140px);
bottom:-140px;
left:-130px;
opacity:.18;
animation:blueMove 12s infinite ease-in-out;

}

@keyframes redMove{

50%{

transform:translate(-45px,45px);

}

}

@keyframes blueMove{

50%{

transform:translate(40px,-35px);

}

}

.container{

position:relative;
z-index:5;
padding:24px;
max-width:480px;
margin:auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;

}

.title{

font-size:34px;
font-weight:700;

}

.sub{

font-size:14px;
color:#9e9e9e;
margin-top:4px;

}

.logo{

width:64px;
height:64px;
border-radius:22px;
background:var(--glass);
backdrop-filter:blur(35px);
display:flex;
align-items:center;
justify-content:center;
border:1px solid var(--border);
box-shadow:
0 18px 40px rgba(0,0,0,.35),
inset 0 1px 1px rgba(255,255,255,.15);

}

.logo img{

width:45px;
height:45px;
border-radius:14px;

}

.search{

width:100%;
height:58px;
padding:0 18px;
border:none;
outline:none;
border-radius:22px;
background:var(--glass);
backdrop-filter:blur(35px);
border:1px solid var(--border);
color:#fff;
font-size:15px;
margin-bottom:20px;

}

.search::placeholder{

color:#888;

}
.card{

background:var(--glass);

backdrop-filter:blur(35px);

border:1px solid var(--border);

border-radius:28px;

padding:20px;

margin-bottom:20px;

box-shadow:

0 18px 45px rgba(0,0,0,.35),

inset 0 1px 1px rgba(255,255,255,.12);

}

.date{

font-size:14px;

color:#FFD60A;

margin-bottom:16px;

font-weight:600;

}

.itemTitle{

font-size:22px;

font-weight:700;

margin-bottom:18px;

}

.label{

display:block;

font-size:13px;

color:#bdbdbd;

margin-bottom:6px;

margin-top:12px;

}

.input{

width:100%;

height:56px;

border:none;

outline:none;

border-radius:18px;

padding:0 18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

color:#fff;

font-size:16px;

}

.input[readonly]{

background:rgba(255,255,255,.04);

color:#22c55e;

font-weight:700;

}

.saveBtn{

margin-top:18px;

width:100%;

height:58px;

border:none;

border-radius:20px;

font-size:17px;

font-weight:700;

color:#fff;

cursor:pointer;

background:linear-gradient(135deg,#E30613,#ff4545);

box-shadow:0 15px 35px rgba(227,6,19,.35);

transition:.25s;

}

.saveBtn:active{

transform:scale(.97);

}

.bottomNav{

position:fixed;

left:15px;

right:15px;

bottom:16px;

padding:15px;

display:flex;

justify-content:space-around;

background:rgba(255,255,255,.08);

backdrop-filter:blur(35px);

border-radius:28px;

border:1px solid rgba(255,255,255,.12);

box-shadow:0 18px 40px rgba(0,0,0,.35);

z-index:999;

}

.bottomNav button{

background:none;

border:none;

color:#bbb;

font-size:13px;

cursor:pointer;

}

.bottomNav button.active{

color:#fff;

font-weight:700;

}

.space{

height:120px;

}
</head>
