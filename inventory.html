<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory | The Hundred</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{

--glass:rgba(255,255,255,.08);

--border:rgba(255,255,255,.12);

--text:#fff;

}

body{

background:#070707;

color:var(--text);

overflow-x:hidden;

min-height:100vh;

}

body::before{

content:"";

position:fixed;

width:320px;

height:320px;

background:#E30613;

border-radius:50%;

filter:blur(130px);

top:-90px;

right:-90px;

opacity:.20;

animation:redMove 10s ease-in-out infinite;

}

body::after{

content:"";

position:fixed;

width:280px;

height:280px;

background:#0A84FF;

border-radius:50%;

filter:blur(120px);

bottom:-80px;

left:-80px;

opacity:.18;

animation:blueMove 12s ease-in-out infinite;

}

@keyframes redMove{

50%{

transform:translate(-40px,40px);

}

}

@keyframes blueMove{

50%{

transform:translate(40px,-30px);

}

}

.container{

position:relative;

z-index:10;

padding:22px;

max-width:450px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.title{

font-size:30px;

font-weight:700;

}

.subtitle{

color:#bfbfbf;

font-size:14px;

margin-top:5px;

}

.logo{

width:60px;

height:60px;

border-radius:18px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

display:flex;

align-items:center;

justify-content:center;

border:1px solid rgba(255,255,255,.15);

box-shadow:

0 15px 40px rgba(0,0,0,.35),

inset 0 1px 1px rgba(255,255,255,.15);

}

.logo img{

width:42px;

height:42px;

border-radius:12px;

}
.searchBox{

margin-bottom:22px;

position:relative;

}

.search{

width:100%;

height:56px;

padding:0 18px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.12);

color:#fff;

font-size:15px;

}

.search::placeholder{

color:#bfbfbf;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.12);

border-radius:28px;

padding:20px;

margin-bottom:18px;

box-shadow:

0 15px 40px rgba(0,0,0,.35),

inset 0 1px 1px rgba(255,255,255,.12);

}

.label{

font-size:14px;

margin-bottom:8px;

display:block;

color:#d8d8d8;

}

.input{

width:100%;

height:56px;

border:none;

outline:none;

border-radius:18px;

padding:0 18px;

margin-bottom:15px;

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:15px;

}

.input::placeholder{

color:#bfbfbf;

}

.btn{

width:100%;

height:56px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:rgba(255,255,255,.12);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.18);

transition:.25s;

}

.btn:hover{

transform:translateY(-2px);

background:rgba(255,255,255,.18);

}

.list{

margin-top:20px;

display:flex;

flex-direction:column;

gap:14px;

}

.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px;

border-radius:22px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.10);

}

.itemName{

font-size:16px;

font-weight:600;

}

.itemQty{

font-size:13px;

color:#bdbdbd;

margin-top:4px;

}

.badge{

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:600;

background:#E30613;

}

.low{

background:#E30613;

}

.medium{

background:#ff9800;

}

.high{

background:#22c55e;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<div class="title">

Inventory

</div>

<div class="subtitle">

The Hundred Restaurant

</div>

</div>

<div class="logo">

<img src="logo.png">

</div>

</div>

<div class="searchBox">

<input
class="search"
id="search"
placeholder="Search inventory...">

</div>
<div class="card">

<label class="label">

Item Name

</label>

<input
id="itemName"
class="input"
type="text"
placeholder="Ex. Refined Oil">

<label class="label">

Quantity

</label>

<input
id="itemQty"
class="input"
type="text"
placeholder="Ex. 5 Litre / 10 Kg">

<button
id="addBtn"
class="btn">

➕ Add Inventory

</button>

</div>

<div class="card">

<h3 style="margin-bottom:18px;">

Inventory List

</h3>

<div
id="inventoryList"
class="list">

</div>

<div class="badge low">

LOW

</div>

</div>

<div class="item">

<div>

<div class="itemName">

Royal Trophy Rice

</div>

<div class="itemQty">

18 Bag

</div>

</div>

<div class="badge high">

HIGH

</div>

</div>

<div class="item">

<div>

<div class="itemName">

Kitchen King

</div>

<div class="itemQty">

3 Kg

</div>

</div>

<div class="badge medium">

MEDIUM

</div>

</div>

</div>

</div>

<div style="height:95px"></div>

<div class="bottomNav">

<button onclick="location.href='dashboard.html'">

🏠

<br>

Home

</button>

<button style="color:#fff;">

📦

<br>

Inventory

</button>

<button onclick="location.href='requirements.html'">

🛒

<br>

Requirements

</button>

<button onclick="location.href='reports.html'">

📊

<br>

Reports

</button>

</div>

<style>

.bottomNav{

position:fixed;

left:15px;

right:15px;

bottom:18px;

display:flex;

justify-content:space-around;

padding:16px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.12);

box-shadow:0 20px 50px rgba(0,0,0,.4);

z-index:999;

}

.bottomNav button{

background:none;

border:none;

color:#a8a8a8;

font-size:13px;

cursor:pointer;

}

</style>
<div style="height:100px;"></div>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;">

<div>

<div style="font-size:14px;color:#bdbdbd;">

Total Items

</div>

<div id="totalItems"

style="font-size:30px;font-weight:700;">

0

</div>

</div>

<div>

<div style="font-size:14px;color:#bdbdbd;">

Low Stock

</div>

<div id="lowStock"

style="font-size:30px;font-weight:700;color:#ff3b30;">

0

</div>

</div>

</div>

</div>

<button

id="fab"

style="position:fixed;
right:22px;
bottom:110px;
width:65px;
height:65px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.12);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.15);
color:#fff;
font-size:30px;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,.35);">

+

</button>

<script>

document.getElementById("fab").onclick=()=>{

document.getElementById("itemName").focus();

};

</script>
  <script type="module" src="inventory.js"></script>

</body>
</html>
